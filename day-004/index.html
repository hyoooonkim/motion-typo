<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 004 — 귀여운 얼굴에 만지는 재미는 덤</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;min-height:100vh;overflow:hidden;cursor:default;}
.back{position:fixed;top:24px;left:24px;color:#555;font-family:'Helvetica Neue',Arial,sans-serif;font-size:11px;letter-spacing:2px;text-decoration:none;text-transform:uppercase;z-index:10;}
.back:hover{color:#aaa;}
.hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#444;font-family:'Helvetica Neue',Arial,sans-serif;font-size:12px;z-index:10;pointer-events:none;transition:opacity 1s;}
.stage{position:relative;width:100vw;height:100vh;}
.letter{
  position:absolute;
  mix-blend-mode:normal;
  cursor:pointer;
  transition:left 0.8s cubic-bezier(0.25,0.1,0.25,1),top 0.8s cubic-bezier(0.25,0.1,0.25,1);
}
.letter img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;user-select:none;}
</style>
</head>
<body>
<a class="back" href="../index.html">← Gallery</a>
<div class="hint" id="hint">click to read</div>
<div class="stage" id="stage"></div>
<script>
var data=[
{img:'01_fur.png',type:'fur'},{img:'02_jelly.png',type:'jelly'},{img:'03_balloon.png',type:'balloon'},
{img:'04_chrome.png',type:'chrome'},{img:'05_glass.png',type:'glass'},{img:'06_wood.png',type:'wood'},
{img:'07_slime.png',type:'slime'},{img:'08_water.png',type:'water'},{img:'09_cloud.png',type:'cloud'},
{img:'10_bubble.png',type:'bubble'},{img:'11_clay.png',type:'clay'},{img:'12_latex.png',type:'latex'},
{img:'13_cotton.png',type:'cotton'}];

var S; // 글자 크기
var mode='face'; // face or text
var els=[];
var audioCtx=null,audioUnlocked=false;

function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
document.addEventListener('click',function(){if(!audioUnlocked){var c=getAudio();if(c.state==='suspended')c.resume();audioUnlocked=true;}});

function playSound(t){
  try{var c=getAudio();
  if(t==='glass'){var o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=2500+Math.random()*1500;g.gain.setValueAtTime(0.15,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.3);}
  else if(t==='wood'){var b=c.createBuffer(1,c.sampleRate*0.05,c.sampleRate),d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,4);var s=c.createBufferSource();s.buffer=b;var f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=500;var g=c.createGain();g.gain.value=0.25;s.connect(f);f.connect(g);g.connect(c.destination);s.start();}
  else if(t==='bubble'){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(1000,c.currentTime);o.frequency.exponentialRampToValueAtTime(150,c.currentTime+0.08);g.gain.setValueAtTime(0.25,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.1);}
  else if(t==='balloon'||t==='chrome'){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(400,c.currentTime);o.frequency.exponentialRampToValueAtTime(700,c.currentTime+0.2);g.gain.setValueAtTime(0.1,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.3);}
  else if(t==='slime'){var o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(120,c.currentTime);o.frequency.exponentialRampToValueAtTime(60,c.currentTime+0.2);g.gain.setValueAtTime(0.06,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.25);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.25);}
  else if(t==='latex'){var o=c.createOscillator(),g=c.createGain();o.type='square';o.frequency.setValueAtTime(200,c.currentTime);o.frequency.exponentialRampToValueAtTime(350,c.currentTime+0.05);o.frequency.exponentialRampToValueAtTime(120,c.currentTime+0.2);g.gain.setValueAtTime(0.08,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.2);}
  }catch(e){}
}

function calcPositions(){
  var W=innerWidth,H=innerHeight;
  S=Math.min(W/5,H/4,240);
  var cx=W/2,cy=H/2;
  var gap=S*0.05;

  // 얼굴 배치 — 글자들이 뭉쳐서 눈/코/입 형태
  var face=[];
  var ss=S*0.45; // 글자 간 간격 (밀착)

  // 왼쪽 눈: 귀(0) 여(1) 운(2) — 동그랗게 뭉침
  var eyeY=cy-S*1.2;
  var eyeLx=cx-S*1.8;
  face[0]={x:eyeLx,y:eyeY-ss*0.5};
  face[1]={x:eyeLx-ss*0.6,y:eyeY+ss*0.45};
  face[2]={x:eyeLx+ss*0.6,y:eyeY+ss*0.45};

  // 오른쪽 눈: 얼(3) 굴(4) 에(5) — 동그랗게 뭉침
  var eyeRx=cx+S*1.8;
  face[3]={x:eyeRx,y:eyeY-ss*0.5};
  face[4]={x:eyeRx-ss*0.6,y:eyeY+ss*0.45};
  face[5]={x:eyeRx+ss*0.6,y:eyeY+ss*0.45};

  // 코: 만(6) 지(7) 는(8) — 세로 일자
  face[6]={x:cx,y:cy-ss*0.7};
  face[7]={x:cx,y:cy};
  face[8]={x:cx,y:cy+ss*0.7};

  // 입: 재(9) 미(10) 는(11) 덤(12) — 웃는 입 (U자 곡선)
  var mouthY=cy+S*1.6;
  face[9]={x:cx-ss*1.5,y:mouthY-ss*0.3};
  face[10]={x:cx-ss*0.5,y:mouthY+ss*0.4};
  face[11]={x:cx+ss*0.5,y:mouthY+ss*0.4};
  face[12]={x:cx+ss*1.5,y:mouthY-ss*0.3};

  // 텍스트 배치 (3줄)
  var text=[];
  var sp=S*0.1; // 띄어쓰기
  var gs=S*0.75; // 글자 간격 (줄임)
  // 1줄: 귀여운 얼굴에
  var row1W=gs*5+sp;
  var r1x=cx-row1W/2;
  var r1y=cy-S*1.3;
  for(var i=0;i<3;i++) text[i]={x:r1x+i*gs,y:r1y};
  for(var i=3;i<6;i++) text[i]={x:r1x+i*gs+sp,y:r1y};
  // 2줄: 만지는
  var row2W=gs*2;
  var r2x=cx-row2W/2;
  var r2y=cy;
  for(var i=6;i<9;i++) text[i]={x:r2x+(i-6)*gs,y:r2y};
  // 3줄: 재미는 덤
  var row3W=gs*3+sp;
  var r3x=cx-row3W/2;
  var r3y=cy+S*1.1;
  for(var i=9;i<12;i++) text[i]={x:r3x+(i-9)*gs,y:r3y};
  text[12]={x:r3x+3*gs+sp,y:r3y};

  return{face:face,text:text};
}

function applyPositions(posArr){
  els.forEach(function(el,i){
    el.style.left=(posArr[i].x-S/2)+'px';
    el.style.top=(posArr[i].y-S/2)+'px';
  });
}

// 재질별 모션
function applyMotion(el,type,t,hover,e){
  var rect=el.getBoundingClientRect();
  var cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  var mx=e?e.clientX:cx,my=e?e.clientY:cy;
  var dx=(mx-cx)/rect.width,dy=(my-cy)/rect.height;
  var ease=hover?Math.min(t/300,1):Math.max(1-t/400,0);
  var img=el.querySelector('img');

  if(type==='fur'){var tilt=dx*8*ease;img.style.transform='rotate('+tilt+'deg) translate('+dx*5*ease+'px,'+Math.sin(t*0.015)*1*ease+'px)';}
  else if(type==='jelly'){var sx=1+Math.sin(t*0.01)*0.05*ease;img.style.transform='scaleX('+sx+') scaleY('+(2-sx)+') translateY('+Math.sin(t*0.008)*2*ease+'px)';}
  else if(type==='balloon'){img.style.transform='translateY('+(-10*ease+Math.sin(t*0.003)*3*ease)+'px) translateX('+Math.sin(t*0.004)*4*ease+'px) scale('+(1+0.03*ease)+')';}
  else if(type==='chrome'){var flash=1+Math.sin(t*0.012)*0.3*ease;img.style.transform='perspective(400px) rotateY('+(dx*15*ease)+'deg)';img.style.filter='brightness('+flash+') contrast('+(1+ease*0.2)+')';}
  else if(type==='glass'){img.style.transform='translateX('+Math.sin(t*0.05)*3*ease*Math.max(0,1-t/200)+'px)';}
  else if(type==='wood'){img.style.transform='rotate('+dx*8*ease+'deg)';}
  else if(type==='slime'){img.style.transform='scaleX('+(1+dx*0.4*ease)+') scaleY('+(1+dy*0.3*ease)+') skewX('+(dx*15*ease)+'deg)';}
  else if(type==='water'){img.style.transform='translate('+(dx*25*ease)+'px,'+(dy*15*ease)+'px) scale('+(1-0.1*ease)+')';img.style.opacity=1-0.2*ease;}
  else if(type==='cloud'){img.style.transform='translateY('+(-8*ease+Math.sin(t*0.003)*6*ease)+'px) translateX('+Math.sin(t*0.004)*4*ease+'px) scale('+(1+Math.sin(t*0.005)*0.03*ease)+')';}
  else if(type==='bubble'){var p=Math.min(t/300,1);if(hover&&p<0.7){img.style.transform='scale('+(1+p*0.4)+')';img.style.opacity=1;}else if(hover){var pop=(p-0.7)/0.3;img.style.transform='scale('+(1.4-pop*0.5)+')';img.style.opacity=1-pop*0.7;}else{img.style.transform='scale('+(1-ease*0.1)+')';img.style.opacity=0.3+ease*0.7;}}
  else if(type==='clay'){var pr=ease*0.15;img.style.transform='scaleY('+(1-pr)+') scaleX('+(1+pr*0.5)+') translateY('+(pr*8)+'px)';}
  else if(type==='latex'){var st=dx*0.35*ease+Math.sin(t*0.02)*0.04*ease;img.style.transform='scaleX('+(1+st)+') scaleY('+(1-Math.abs(st)*0.3)+')';}
  else if(type==='cotton'){img.style.transform='translateY('+Math.sin(t*0.005)*4*ease+'px) rotate('+(dx*8*ease)+'deg) scale('+(1-0.04*ease)+')';}
}

// 생성
var stage=document.getElementById('stage');
data.forEach(function(d,i){
  var div=document.createElement('div');
  div.className='letter';
  div.style.width=S+'px';div.style.height=S+'px';
  div.innerHTML='<img src="'+d.img+'">';
  stage.appendChild(div);
  els.push(div);

  var time=0,hovered=false,interval=null;
  div.addEventListener('mouseenter',function(e){
    hovered=true;time=0;playSound(d.type);
    if(interval)clearInterval(interval);
    interval=setInterval(function(){time+=16;applyMotion(div,d.type,time,true,e);},16);
  });
  div.addEventListener('mousemove',function(e){if(hovered)applyMotion(div,d.type,time,true,e);});
  div.addEventListener('mouseleave',function(){
    hovered=false;if(interval){clearInterval(interval);interval=null;}
    var t2=0;var restore=setInterval(function(){t2+=16;applyMotion(div,d.type,t2,false,null);
    if(t2>600){clearInterval(restore);var img=div.querySelector('img');img.style.transform='';img.style.opacity='';img.style.filter='';}},16);
  });
});

// 초기 배치
var pos=calcPositions();
// 크기 설정
els.forEach(function(el){el.style.width=S+'px';el.style.height=S+'px';});
applyPositions(pos.face);

// 클릭으로 전환
stage.addEventListener('click',function(){
  var p=calcPositions();
  if(mode==='face'){
    mode='text';
    applyPositions(p.text);
  }else{
    mode='face';
    applyPositions(p.face);
  }
  document.getElementById('hint').style.opacity='0';
});

window.addEventListener('resize',function(){
  var p=calcPositions();
  els.forEach(function(el){el.style.width=S+'px';el.style.height=S+'px';});
  applyPositions(mode==='face'?p.face:p.text);
});
</script>
</body>
</html>
