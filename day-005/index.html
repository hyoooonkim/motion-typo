<!-- SVG 필터: 손그림 질감 -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="2" seed="3"/>

    </filter>
    <filter id="roughStrong" x="-10%" y="-10%" width="120%" height="120%">

    </filter>
    <filter id="inky" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="2.4" numOctaves="1" seed="2"/>
      <feDisplacementMap in="SourceGraphic" scale="0.4"/>
    </filter>

<script>
/* =========================================================
   Day 005 — 취향 너머의 음악을 발견하는 법
   오선 위 음표가 점점 사람 실루엣 → 다양한 취미로 변형
   첫 화면부터 악보 노출, 스크롤로 따라 내려감
========================================================= */

/* ---------- Web Audio ---------- */
let audioCtx = null;
let masterGain = null;
let reverbNode = null;
let dryGain = null;
let wetGain = null;
let soundOn = true;
const soundBtn = document.getElementById('soundBtn');
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '♪ ON' : '♪ OFF';
  if (soundOn) ensureAudio();
});
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.9;
    masterGain.connect(audioCtx.destination);

    // 간단한 인공 리버브 (impulse buffer)
    reverbNode = audioCtx.createConvolver();
    const len = audioCtx.sampleRate * 2.2;
    const impulse = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const data = impulse.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.8);
      }
    }
    reverbNode.buffer = impulse;

    dryGain = audioCtx.createGain(); dryGain.gain.value = 0.75;
    wetGain = audioCtx.createGain(); wetGain.gain.value = 0.35;
    dryGain.connect(masterGain);
    reverbNode.connect(wetGain).connect(masterGain);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur = 0.3, type = 'sine', gain = 0.07) {
  if (!soundOn || !freq) return;
  ensureAudio();
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(gain, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(g);
  g.connect(dryGain);
  g.connect(reverbNode);
  osc.start(t0); osc.stop(t0 + dur + 0.05);
}

/* 오케스트라 피날레용 레이어 사운드 */
function playOrchestral(freq, dur, opts = {}) {
  if (!soundOn || !freq) return;
  ensureAudio();
  const t0 = audioCtx.currentTime;
  const gain = opts.gain || 0.08;

  // 1) 스트링 레이어 (sine + 살짝 비브라토)
  const strOsc = audioCtx.createOscillator();
  const strGain = audioCtx.createGain();
  strOsc.type = 'sine'; strOsc.frequency.value = freq;
  const vib = audioCtx.createOscillator();
  const vibGain = audioCtx.createGain();
  vib.frequency.value = 5.2;
  vibGain.gain.value = freq * 0.005;
  vib.connect(vibGain).connect(strOsc.frequency);
  strGain.gain.setValueAtTime(0, t0);
  strGain.gain.linearRampToValueAtTime(gain * 0.55, t0 + 0.05);
  strGain.gain.linearRampToValueAtTime(gain * 0.45, t0 + dur * 0.6);
  strGain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  strOsc.connect(strGain);
  strGain.connect(dryGain); strGain.connect(reverbNode);
  strOsc.start(t0); strOsc.stop(t0 + dur + 0.05);
  vib.start(t0); vib.stop(t0 + dur + 0.05);

  // 2) 브라스 레이어 (sawtooth with low-pass filter)
  const brsOsc = audioCtx.createOscillator();
  const brsGain = audioCtx.createGain();
  const brsFilter = audioCtx.createBiquadFilter();
  brsOsc.type = 'sawtooth'; brsOsc.frequency.value = freq * 0.5; // 한 옥타브 아래
  brsFilter.type = 'lowpass';
  brsFilter.frequency.value = 1400;
  brsFilter.Q.value = 1;
  brsGain.gain.setValueAtTime(0, t0);
  brsGain.gain.linearRampToValueAtTime(gain * 0.35, t0 + 0.03);
  brsGain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur * 0.9);
  brsOsc.connect(brsFilter).connect(brsGain);
  brsGain.connect(dryGain); brsGain.connect(reverbNode);
  brsOsc.start(t0); brsOsc.stop(t0 + dur + 0.05);

  // 3) 저음 파이프오르간 느낌 (triangle + 옥타브 아래 sine)
  if (opts.sub) {
    const subOsc = audioCtx.createOscillator();
    const subGain = audioCtx.createGain();
    subOsc.type = 'triangle'; subOsc.frequency.value = freq * 0.25;
    subGain.gain.setValueAtTime(0, t0);
    subGain.gain.linearRampToValueAtTime(gain * 0.4, t0 + 0.06);
    subGain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    subOsc.connect(subGain);
    subGain.connect(dryGain); subGain.connect(reverbNode);
    subOsc.start(t0); subOsc.stop(t0 + dur + 0.05);
  }
}

/* 팀파니 (노이즈 + 저음 sine 펄스) */
function playTimpani(freq, dur = 0.8, gain = 0.25) {
  if (!soundOn) return;
  ensureAudio();
  const t0 = audioCtx.currentTime;

  // 저음 오실레이터 (피치가 떨어지는 팀파니 특징)
  const osc = audioCtx.createOscillator();
  const oscGain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq * 1.4, t0);
  osc.frequency.exponentialRampToValueAtTime(freq, t0 + 0.15);
  oscGain.gain.setValueAtTime(0, t0);
  oscGain.gain.linearRampToValueAtTime(gain, t0 + 0.01);
  oscGain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(oscGain);
  oscGain.connect(dryGain); oscGain.connect(reverbNode);
  osc.start(t0); osc.stop(t0 + dur + 0.1);

  // 노이즈 어택
  const noiseDur = 0.15;
  const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * noiseDur, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const nFilter = audioCtx.createBiquadFilter();
  nFilter.type = 'lowpass';
  nFilter.frequency.value = 220;
  const nGain = audioCtx.createGain();
  nGain.gain.value = gain * 0.7;
  noise.connect(nFilter).connect(nGain);
  nGain.connect(dryGain);
  noise.start(t0);
}

/* 심벌 (high-freq 노이즈) */
function playCymbal(dur = 1.2, gain = 0.15) {
  if (!soundOn) return;
  ensureAudio();
  const t0 = audioCtx.currentTime;
  const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 1.4);
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 4500;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(gain, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  noise.connect(hp).connect(g);
  g.connect(dryGain); g.connect(reverbNode);
  noise.start(t0);
}

/* ---------- 음계 ---------- */
const N = {
  C3:130.81, D3:146.83, E3:164.81, F3:174.61, G3:196.00, A3:220.00, B3:246.94,
  C4:261.63, Cs4:277.18, D4:293.66, Ds4:311.13, E4:329.63, F4:349.23, Fs4:369.99,
  G4:392.00, Gs4:415.30, A4:440.00, As4:466.16, B4:493.88,
  C5:523.25, Cs5:554.37, D5:587.33, Ds5:622.25, E5:659.25, F5:698.46, Fs5:739.99,
  G5:783.99, Gs5:830.61, A5:880.00, B5:987.77, C6:1046.50
};

// 오선 기준 staff step (C4 = 0, 한 줄/칸 올라갈 때마다 -1)
const STAFF_STEP = {
  [N.E3]:8, [N.F3]:7, [N.G3]:6, [N.A3]:5, [N.B3]:4,
  [N.C4]:3, [N.D4]:2, [N.E4]:1, [N.F4]:0, [N.G4]:-1,
  [N.A4]:-2, [N.B4]:-3, [N.C5]:-4, [N.D5]:-5, [N.E5]:-6,
  [N.F5]:-7, [N.G5]:-8, [N.A5]:-9, [N.B5]:-10, [N.C6]:-11,
  // 샵은 근처 자연음 위치
  [N.Cs4]:3, [N.Ds4]:1, [N.Fs4]:0, [N.Gs4]:-1, [N.As4]:-2,
  [N.Cs5]:-4, [N.Ds5]:-6, [N.Fs5]:-7, [N.Gs5]:-8
};

const SHARP_NOTES = new Set([N.Cs4, N.Ds4, N.Fs4, N.Gs4, N.As4, N.Cs5, N.Ds5, N.Fs5, N.Gs5]);

/* ---------- 멜로디 + 가사 ----------
   Bach BWV 846 하모니 진행을 뼈대로, 악장마다 변주.
   가사는 antiegg.kr 기사(취향 너머의 음악을 발견하는 법) 메시지를 paraphrase.
*/

// 베이스 패턴: 한 마디 = 8개의 8분음표 아르페지오
function arpeggio(root, third, fifth, top, lyrics) {
  const pitches = [root, third, fifth, top, fifth, third, fifth, top];
  return pitches.map((p, i) => ({ p, d: .5, l: (lyrics && lyrics[i]) || '' }));
}

// I — "듣던 노래만 매일 반복해 알고리즘이 고르는 노래" — 24음표
const MEL_1 = [
  ...arpeggio(N.C4, N.E4, N.G4, N.C5, ['듣','던','노','래','만','매','일','같']),
  ...arpeggio(N.C4, N.D4, N.A4, N.D5, ['이','반','복','해','다','시','또','다']),
  ...arpeggio(N.B3, N.D4, N.G4, N.D5, ['시','알','고','리','즘','이','고','른']),
  ...arpeggio(N.C4, N.E4, N.G4, N.C5, ['노','래','만','흘','러','나','와','요'])
];

// II — "비슷한 멜로디 비슷한 리듬 익숙함에 갇혀 같은 곳을 맴돌아" — 24음표
const MEL_2 = [
  { p:N.C4,d:1,l:'비' },{ p:N.E4,d:.5,l:'슷' },{ p:N.G4,d:.5,l:'한' },
  { p:N.C5,d:1,l:'멜' },{ p:N.E5,d:.5,l:'로' },{ p:N.G4,d:.5,l:'디' },
  { p:N.C4,d:.5,l:'비' },{ p:N.D4,d:.5,l:'슷' },{ p:N.A4,d:1,l:'한' },
  { p:N.D5,d:.5,l:'리' },{ p:N.F5,d:.5,l:'듬' },{ p:N.A4,d:1,l:'과' },
  { p:N.B3,d:.5,l:'익' },{ p:N.D4,d:.5,l:'숙' },{ p:N.G4,d:1,l:'함' },
  { p:N.D5,d:.5,l:'에' },{ p:N.F5,d:.5,l:'갇' },{ p:N.G4,d:1,l:'혀' },
  { p:N.C4,d:.5,l:'같' },{ p:N.E4,d:.5,l:'은' },{ p:N.G4,d:.5,l:'곳' },
  { p:N.C5,d:.5,l:'을' },{ p:N.E5,d:1,l:'맴' },{ p:N.C5,d:1,l:'돌' }
];

   각 악장마다 레이아웃 모드:
   0: 정석 수평
   1: 정석, 음표 살짝 기울어짐
   2: 선이 부드럽게 물결
   3: 선이 크게 휘며 갈라짐 (구름)
   4: 선이 폭포처럼 무너짐 (Waterfall)
   5: 선이 다시 정렬, 전부 사람, 마지막 낙하산
---------------------------------------------- */
const LAYOUT = ['straight', 'tilted', 'wavy', 'clouded', 'waterfall', 'ascend'];

function buildStaveSVG(index) {
  const W = 1200;
  const H = 290;
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'none');
  const noteEls = []; // 각 멜로디 노트에 대응하는 DOM (bounce 호출용)

  const STAVE_TOP = 90;
  const LINE_GAP = 7;
  const mode = LAYOUT[index];

  // 오선 Y좌표 함수: 모든 악장에서 평평하게 (단정한 악보)
  function lineYOffset(x, lineIdx) {
    return 0;
  }

  // baseY: 5줄 중간선 (3번째 줄)의 기본 y
  const baseY = STAVE_TOP + 2 * LINE_GAP;

  // 5줄 오선 그리기
  const linesG = document.createElementNS(svgNS, 'g');
  linesG.setAttribute('stroke', '#1a1a1a');
  linesG.setAttribute('stroke-width', '1.1');
  linesG.setAttribute('fill', 'none');
  linesG.setAttribute('filter', 'url(#rough)');

  for (let i = 0; i < 5; i++) {
    const lineY = STAVE_TOP + i * LINE_GAP;
    const segs = 80;
    let d = '';
    for (let s = 0; s <= segs; s++) {
      const x = 40 + (W - 80) * (s / segs);
      const y = lineY + lineYOffset(x, i);
      d += (s === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
    }
    const path = document.createElementNS(svgNS, 'path');
    path.setAttribute('d', d);
    linesG.appendChild(path);
  }
  svg.appendChild(linesG);

  // 높은음자리표
  const clef = document.createElementNS(svgNS, 'text');
  clef.setAttribute('x', 44);
  clef.setAttribute('y', STAVE_TOP + 4.8 * LINE_GAP);
  clef.setAttribute('font-size', '78');
  clef.setAttribute('font-family', 'Times, serif');
  clef.setAttribute('fill', '#111');
  clef.setAttribute('filter', 'url(#rough)');
  clef.textContent = '𝄞';
  svg.appendChild(clef);

  // 박자표
  const beatNum = document.createElementNS(svgNS, 'text');
  beatNum.setAttribute('x', 95);
  beatNum.setAttribute('y', STAVE_TOP + 2.3 * LINE_GAP);
  beatNum.setAttribute('font-size', '24');
  beatNum.setAttribute('font-weight', 'bold');
  beatNum.setAttribute('font-family', 'Times, serif');
  beatNum.setAttribute('fill', '#111');
  beatNum.setAttribute('filter', 'url(#rough)');
  beatNum.textContent = index === 2 ? '3' : '4';
  svg.appendChild(beatNum);
  const beatDen = beatNum.cloneNode();
  beatDen.setAttribute('y', STAVE_TOP + 4.3 * LINE_GAP);
  beatDen.textContent = '4';
  svg.appendChild(beatDen);

  // 악장 템포 마킹 (오선 위)
  const meta = MOVEMENTS_META[index];
  const tempoText = document.createElementNS(svgNS, 'text');
  tempoText.setAttribute('x', 40);
  tempoText.setAttribute('y', STAVE_TOP - 20);
  tempoText.setAttribute('font-size', 15);
  tempoText.setAttribute('font-family', 'Times, serif');
  tempoText.setAttribute('font-weight', 'bold');
  tempoText.setAttribute('fill', '#111');
  tempoText.textContent = meta.tempo;
  svg.appendChild(tempoText);

  const italianText = document.createElementNS(svgNS, 'text');
  italianText.setAttribute('x', 40);
  italianText.setAttribute('y', STAVE_TOP - 6);
  italianText.setAttribute('font-size', 12);
  italianText.setAttribute('font-family', 'Times, serif');
  italianText.setAttribute('font-style', 'italic');
  italianText.setAttribute('fill', '#333');
  italianText.textContent = `(${meta.italian}, ♩ = ${BPMS[index]})`;
  svg.appendChild(italianText);

  // 다이나믹 기호 (오선 아래, 시작 부분)
  const dyn = document.createElementNS(svgNS, 'text');
  dyn.setAttribute('x', 125);
  dyn.setAttribute('y', STAVE_TOP + 6 * LINE_GAP);
  dyn.setAttribute('font-size', 20);
  dyn.setAttribute('font-family', 'Times, serif');
  dyn.setAttribute('font-style', 'italic');
  dyn.setAttribute('font-weight', 'bold');
  dyn.setAttribute('fill', '#111');
  dyn.setAttribute('filter', 'url(#rough)');
  dyn.textContent = meta.dynamic;
  svg.appendChild(dyn);

  // 마디 번호 (왼쪽 상단, 이전 악장까지 마디 누적)
  let measureNumber = 1;
  for (let k = 0; k < index; k++) {
    const prevBarBeats = k === 2 ? 3 : 4;
    const totalPrev = MELODIES[k].reduce((s, n) => s + n.d, 0);
    measureNumber += Math.floor(totalPrev / prevBarBeats);
  }
  const measureText = document.createElementNS(svgNS, 'text');
  measureText.setAttribute('x', 125);
  measureText.setAttribute('y', STAVE_TOP - 6);
  measureText.setAttribute('font-size', 10);
  measureText.setAttribute('font-family', 'Times, serif');
  measureText.setAttribute('fill', '#666');
  measureText.textContent = measureNumber;
  svg.appendChild(measureText);

  // 음표 배치
  const melody = MELODIES[index];
  const START_X = 130;
  const END_X = W - 60;

  // 박자 합계
  const totalBeat = melody.reduce((s, n) => s + n.d, 0);
  let curBeat = 0;

  // 마디선 위치 계산 (4박마다)
  const BAR_BEATS = index === 2 ? 3 : 4;
  const barPositions = [];
  let acc = 0;
  for (const n of melody) {
    acc += n.d;
    if (Math.abs((acc % BAR_BEATS)) < 0.001) barPositions.push(acc);
  }

  // 사람 변환 비율 (악장 진행에 따라 증가)
  // index 5(마지막)도 index 4와 동일한 비율로 유지 (너무 많아 보이지 않도록)
  const ratioIndex = index === 5 ? 4 : index;
  const humanRatioBase = ratioIndex / (CAPTIONS.length - 1); // 0 → 0.8

  const notesG = document.createElementNS(svgNS, 'g');
  svg.appendChild(notesG);

  // 마디선
  barPositions.forEach(b => {
    const t = b / totalBeat;
    const x = START_X + t * (END_X - START_X);
    const top = STAVE_TOP + lineYOffset(x, 0);
    const bot = STAVE_TOP + 4 * LINE_GAP + lineYOffset(x, 4);
    const bar = document.createElementNS(svgNS, 'line');
    bar.setAttribute('x1', x); bar.setAttribute('y1', top);
    bar.setAttribute('x2', x); bar.setAttribute('y2', bot);
    bar.setAttribute('stroke', '#1a1a1a');
    bar.setAttribute('stroke-width', 0.9);
    bar.setAttribute('filter', 'url(#rough)');
    notesG.appendChild(bar);
  });

  // 끝줄 종지선 — 마지막 악장은 final double bar (가는선+굵은선), 나머지는 double bar
  const endTop = STAVE_TOP + lineYOffset(END_X, 0);
  const endBot = STAVE_TOP + 4 * LINE_GAP + lineYOffset(END_X, 4);
  const thinBar = document.createElementNS(svgNS, 'line');
  thinBar.setAttribute('x1', END_X - 8); thinBar.setAttribute('y1', endTop);
  thinBar.setAttribute('x2', END_X - 8); thinBar.setAttribute('y2', endBot);
  thinBar.setAttribute('stroke', '#1a1a1a'); thinBar.setAttribute('stroke-width', 1);
  thinBar.setAttribute('filter', 'url(#rough)');
  notesG.appendChild(thinBar);
  const thickBar = document.createElementNS(svgNS, 'line');
  thickBar.setAttribute('x1', END_X - 2); thickBar.setAttribute('y1', endTop);
  thickBar.setAttribute('x2', END_X - 2); thickBar.setAttribute('y2', endBot);
  thickBar.setAttribute('stroke', '#1a1a1a');
  thickBar.setAttribute('stroke-width', index === CAPTIONS.length - 1 ? 4 : 1);
  thickBar.setAttribute('filter', 'url(#rough)');
  notesG.appendChild(thickBar);

  // 마지막 악장 끝에 Fine 표기
  if (index === CAPTIONS.length - 1) {
    const fine = document.createElementNS(svgNS, 'text');
    fine.setAttribute('x', END_X - 8);
    fine.setAttribute('y', STAVE_TOP - 8);
    fine.setAttribute('font-size', 14);
    fine.setAttribute('font-family', 'Times, serif');
    fine.setAttribute('font-style', 'italic');
    fine.setAttribute('font-weight', 'bold');
    fine.setAttribute('text-anchor', 'end');
    fine.setAttribute('fill', '#111');
    fine.textContent = 'Fine.';
    svg.appendChild(fine);
  }

  melody.forEach((note, i) => {
    const tBeat = curBeat + note.d * 0.5;
    curBeat += note.d;
    const tx = tBeat / totalBeat;
    const x = START_X + tx * (END_X - START_X);

    // 피치 → y
    const step = STAFF_STEP[note.p] !== undefined ? STAFF_STEP[note.p] : 0;
    // 기준: F4가 step 0, 한 step마다 LINE_GAP/2 만큼
    const baseNoteY = STAVE_TOP + step * (LINE_GAP / 2);
    const y = baseNoteY + lineYOffset(x, 2);

    // 이 자리에 사람을 놓을 확률
    // 5번째(V) 악장은 90%, 6번째(VI) 악장은 100% 사람
    const jitter = (Math.sin(i * 2.3 + index * 5.7) + 1) / 2;
    let asHuman = jitter < humanRatioBase;
    if (index === 4) asHuman = jitter < 0.9;
    if (index === 5) asHuman = true;

    // 마지막 악장 마지막 노트는 낙하산으로
    const isParachute = (index === 5 && i === melody.length - 1);

    let noteEl;
    if (isParachute) {
      noteEl = addHuman(notesG, 29, x, y + 60, 1.6, note);
    } else if (asHuman) {
      // 29번(낙하산)은 일반 자리에 사용 X
      const hIdx = (i * 11 + index * 7 + 3) % HUMANS.length;
      const safeIdx = hIdx === 29 ? 2 : hIdx;
      const scale = 0.75 + (humanRatioBase - 0.3) * 0.5;
      noteEl = addHuman(notesG, safeIdx, x, y, Math.max(0.5, Math.min(1.2, scale)), note);
    } else {
      noteEl = addNote(notesG, x, y, note);
    }

    // 가사 렌더 (오선 아래) + 음표와 함께 튕기도록 연결
    if (note.l && note.l.trim()) {
      // 다음 노트와의 X 간격에 따라 폰트 크기 조정 (겹침 방지)
      let nextX = END_X;
      if (i < melody.length - 1) {
        const nextTBeat = curBeat + melody[i + 1].d * 0.5;
        nextX = START_X + (nextTBeat / totalBeat) * (END_X - START_X);
      }
      const gap = Math.abs(nextX - x);
      const fontSize = gap < 18 ? 10 : gap < 26 ? 12 : 14;

      // 가사 Y는 오선 하단 + lineYOffset 반영 (악보 따라 내려감)
      const baseLyricY = STAVE_TOP + 5.2 * LINE_GAP + 38; // 기존보다 더 아래
      const ly = baseLyricY + lineYOffset(x, 4);

      const lyric = document.createElementNS(svgNS, 'text');
      lyric.setAttribute('x', x);
      lyric.setAttribute('y', ly);
      lyric.setAttribute('font-size', fontSize);
      lyric.setAttribute('font-family', "'Nanum Myeongjo', 'Noto Serif KR', serif");
      lyric.setAttribute('text-anchor', 'middle');
      lyric.setAttribute('fill', '#222');
      lyric.setAttribute('filter', 'url(#inky)');
      lyric.setAttribute('transform', 'translate(0 0)');
      lyric._baseTransform = 'translate(0 0)';
      lyric.textContent = note.l;
      notesG.appendChild(lyric);
      noteEl._lyric = lyric;
    }

    noteEls.push(noteEl);
  });

  // Waterfall/파티클 효과 제거 — 단정한 악보

  return { svg, noteEls };
}

function addNote(g, x, y, note) {
  const svgNS = 'http://www.w3.org/2000/svg';
  const grp = document.createElementNS(svgNS, 'g');
  grp.setAttribute('filter', 'url(#inky)');
  grp.setAttribute('transform', 'translate(0 0)');
  grp._baseTransform = 'translate(0 0)';
  grp.style.cursor = 'pointer';

  // 샵 기호
  if (SHARP_NOTES.has(note.p)) {
    const sharp = document.createElementNS(svgNS, 'text');
    sharp.setAttribute('x', x - 12); sharp.setAttribute('y', y + 3);
    sharp.setAttribute('font-size', 16);
    sharp.setAttribute('font-family', 'Times, serif');
    sharp.setAttribute('fill', '#111');
    sharp.textContent = '♯';
    grp.appendChild(sharp);
  }

  // note head
  const head = document.createElementNS(svgNS, 'ellipse');
  head.setAttribute('cx', x); head.setAttribute('cy', y);
  head.setAttribute('rx', 5.5); head.setAttribute('ry', 4);
  head.setAttribute('fill', note.d >= 2 ? 'none' : '#111');
  head.setAttribute('stroke', '#111');
  head.setAttribute('stroke-width', note.d >= 2 ? 1.4 : 0);
  head.setAttribute('transform', `rotate(-22 ${x} ${y})`);
  grp.appendChild(head);

  // stem
  if (note.d < 4) {
    const stemUp = y > 90; // 선 위/아래 따라 방향
    const stem = document.createElementNS(svgNS, 'line');
    const x1 = stemUp ? x + 5 : x - 5;
    const y2 = stemUp ? y - 32 : y + 32;
    stem.setAttribute('x1', x1); stem.setAttribute('y1', y);
    stem.setAttribute('x2', x1); stem.setAttribute('y2', y2);
    stem.setAttribute('stroke', '#111');
    stem.setAttribute('stroke-width', 1.3);
    grp.appendChild(stem);

    // 깃발
    if (note.d <= 0.5) {
      const flags = note.d === 0.25 ? 2 : 1;
      for (let f = 0; f < flags; f++) {
        const fy = y2 + f * 6 * (stemUp ? 1 : -1);
        const flag = document.createElementNS(svgNS, 'path');
        const dx = stemUp ? 12 : -12;
        flag.setAttribute('d', `M${x1},${fy} Q${x1+dx},${fy+6*(stemUp?1:-1)} ${x1+dx-2},${fy+14*(stemUp?1:-1)}`);
        flag.setAttribute('stroke', '#111');
        flag.setAttribute('stroke-width', 1.3);
        flag.setAttribute('fill', 'none');
        grp.appendChild(flag);
      }
    }
  }

  grp.addEventListener('mouseenter', () => {
    animateBounce(grp, -4, 220);
  });

  grp._bounce = () => {
    animateBounce(grp, -12, 380);
  };

  g.appendChild(grp);
  return grp;
}

function addHuman(g, humanIdx, x, y, scale, note) {
  const svgNS = 'http://www.w3.org/2000/svg';
  const path = document.createElementNS(svgNS, 'path');
  path.setAttribute('d', HUMANS[humanIdx]);
  path.setAttribute('fill', '#0e0e0e');
  path.setAttribute('stroke', '#0e0e0e');
  path.setAttribute('stroke-width', 0.5);
  path.setAttribute('stroke-linejoin', 'round');
  path.setAttribute('filter', 'url(#roughMid)');
  const hw = 80 * scale, hh = 100 * scale;
  // 사람이 오선에 걸치도록: 몸통 중앙(대략 아래쪽 30%)이 노트 y에 오게
  // 즉 발이 노트 y + hh*0.3 (오선 아래로 약간 내려옴)
  const baseTx = x - hw / 2;
  const baseTy = y - hh * 0.7;
  const baseTransform = `translate(${baseTx} ${baseTy}) scale(${scale})`;
  path.setAttribute('transform', baseTransform);
  path._baseTransform = baseTransform;
  path._baseX = baseTx;
  path._baseY = baseTy;
  path._centerX = x;
  path._centerY = y;
  path._scale = scale;
  path.style.cursor = 'pointer';

  path.addEventListener('mouseenter', () => {
    animateBounce(path, -6, 260);
  });

  // 30개 포즈를 보완할 특수 모션 — 회전/뒤집기/흔들기 등
  path._specialKind = pickSpecialKind(humanIdx);
  path._bounce = () => {
    runSpecialMotion(path);
  };

  g.appendChild(path);
  return path;
}

// 포즈마다 어울리는 특수 모션 종류 부여
function pickSpecialKind(humanIdx) {
  // 공중회전/발레/훌라후프/힙합은 회전, 점프류는 큰 바운스, 그 외는 일반 튕김
  const spinPoses   = [9, 16, 19, 4, 18]; // 공중회전, 발레, 훌라후프, 옆점프, 힙합
  const bigJumpPoses= [3, 24, 2];         // 점프, 배구스파이크, 달리기
  const wigglePoses = [6, 7, 8, 17, 28];  // 요가, 탱고, 명상
  const tiltPoses   = [5, 10, 11, 15, 20, 21, 22, 23];
  if (spinPoses.includes(humanIdx))    return 'spin';
  if (bigJumpPoses.includes(humanIdx)) return 'bigjump';
  if (wigglePoses.includes(humanIdx))  return 'wiggle';
  if (tiltPoses.includes(humanIdx))    return 'tilt';
  return 'bounce';
}

function runSpecialMotion(el) {
  const kind = el._specialKind || 'bounce';
  switch (kind) {
    case 'spin':    animateSpin(el, 360, 520); break;
    case 'bigjump': animateBounce(el, -20, 520); break;
    case 'wiggle':  animateWiggle(el, 380); break;
    case 'tilt':    animateTilt(el, 15, 380); break;
    default:        animateBounce(el, -14, 420);
  }
}

/* 회전 (핑그르르) */
function animateSpin(el, degrees = 360, totalMs = 500) {
  if (el._bouncing) return;
  el._bouncing = true;
  const base = el._baseTransform || 'translate(0 0)';
  const match = base.match(/translate\(\s*([-\d.]+)[ ,]+([-\d.]+)\s*\)/);
  const bx = match ? parseFloat(match[1]) : 0;
  const by = match ? parseFloat(match[2]) : 0;
  const scalePart = base.includes('scale') ? base.substring(base.indexOf('scale')) : '';
  const cx = el._centerX || (bx + 40);
  const cy = el._centerY || (by + 70);
  const t0 = performance.now();
  function tick(now) {
    const t = now - t0;
    const p = Math.min(1, t / totalMs);
    // easeOutCubic
    const eased = 1 - Math.pow(1 - p, 3);
    const deg = degrees * eased;
    const jump = Math.sin(p * Math.PI) * -6;
    el.setAttribute('transform', `translate(${bx} ${by + jump}) rotate(${deg} ${cx - bx} ${cy - by}) ${scalePart}`.trim());
    if (p < 1) requestAnimationFrame(tick);
    else { el.setAttribute('transform', base); el._bouncing = false; }
  }
  requestAnimationFrame(tick);
}

/* 흔들기 (좌우) */
function animateWiggle(el, totalMs = 380) {
  if (el._bouncing) return;
  el._bouncing = true;
  const base = el._baseTransform || 'translate(0 0)';
  const match = base.match(/translate\(\s*([-\d.]+)[ ,]+([-\d.]+)\s*\)/);
  const bx = match ? parseFloat(match[1]) : 0;
  const by = match ? parseFloat(match[2]) : 0;
  const scalePart = base.includes('scale') ? base.substring(base.indexOf('scale')) : '';
  const cx = el._centerX || (bx + 40);
  const cy = el._centerY || (by + 70);
  const t0 = performance.now();
  function tick(now) {
    const t = now - t0;
    const p = Math.min(1, t / totalMs);
    const deg = Math.sin(p * Math.PI * 3) * 10 * (1 - p);
    const jump = Math.sin(p * Math.PI) * -5;
    el.setAttribute('transform', `translate(${bx} ${by + jump}) rotate(${deg} ${cx - bx} ${cy - by}) ${scalePart}`.trim());
    if (p < 1) requestAnimationFrame(tick);
    else { el.setAttribute('transform', base); el._bouncing = false; }
  }
  requestAnimationFrame(tick);
}

/* 기울이기 (한쪽으로 쏠리며 튕김) */
function animateTilt(el, maxDeg = 15, totalMs = 380) {
  if (el._bouncing) return;
  el._bouncing = true;
  const base = el._baseTransform || 'translate(0 0)';
  const match = base.match(/translate\(\s*([-\d.]+)[ ,]+([-\d.]+)\s*\)/);
  const bx = match ? parseFloat(match[1]) : 0;
  const by = match ? parseFloat(match[2]) : 0;
  const scalePart = base.includes('scale') ? base.substring(base.indexOf('scale')) : '';
  const cx = el._centerX || (bx + 40);
  const cy = el._centerY || (by + 70);
  const dir = Math.random() < 0.5 ? 1 : -1;
  const t0 = performance.now();
  function tick(now) {
    const t = now - t0;
    const p = Math.min(1, t / totalMs);
    // easeOutBack
    const c1 = 1.70158, c3 = c1 + 1;
    const eased = 1 + c3 * Math.pow(p - 1, 3) + c1 * Math.pow(p - 1, 2);
    const deg = maxDeg * dir * Math.sin(p * Math.PI);
    const jump = -10 * Math.sin(p * Math.PI);
    el.setAttribute('transform', `translate(${bx} ${by + jump}) rotate(${deg} ${cx - bx} ${cy - by}) ${scalePart}`.trim());
    if (p < 1) requestAnimationFrame(tick);
    else { el.setAttribute('transform', base); el._bouncing = false; }
  }
  requestAnimationFrame(tick);
}

/* SVG transform attribute 기반 bounce — CSS와 충돌 없음 */
function animateBounce(el, offsetY, totalMs = 380) {
  if (el._bouncing) return;
  el._bouncing = true;
  const base = el._baseTransform || el.getAttribute('transform') || 'translate(0 0)';
  // base translate 추출
  const match = base.match(/translate\(\s*([-\d.]+)[ ,]+([-\d.]+)\s*\)/);
  const bx = match ? parseFloat(match[1]) : 0;
  const by = match ? parseFloat(match[2]) : 0;
  const scalePart = base.includes('scale') ? base.substring(base.indexOf('scale')) : '';

  const t0 = performance.now();
  const upMs = totalMs * 0.3;
  function tick(now) {
    const t = now - t0;
    let dy = 0;
    if (t < upMs) {
      // up
      const p = t / upMs;
      dy = offsetY * p;
    } else if (t < totalMs) {
      // down with bounce
      const p = (t - upMs) / (totalMs - upMs);
      // easeOutBack
      const c1 = 1.70158, c3 = c1 + 1;
      const eased = 1 + c3 * Math.pow(p - 1, 3) + c1 * Math.pow(p - 1, 2);
      dy = offsetY * (1 - eased);
    } else {
      dy = 0;
    }
    el.setAttribute('transform', `translate(${bx} ${by + dy}) ${scalePart}`.trim());
    if (t < totalMs) {
      requestAnimationFrame(tick);
    } else {
      el.setAttribute('transform', base);
      el._bouncing = false;
    }
  }
  requestAnimationFrame(tick);
}

/* ---------- 스테이브 엘리먼트 생성 ---------- */
const scoreEl = document.getElementById('score');
const staveEls = [];
const staveNotes = []; // [[noteEl, noteEl, ...], ...]
for (let i = 0; i < CAPTIONS.length; i++) {
  const div = document.createElement('div');
  div.className = 'stave';
  div.dataset.index = i;
  const { svg, noteEls } = buildStaveSVG(i);
  div.appendChild(svg);
  scoreEl.appendChild(div);
  staveEls.push(div);
  staveNotes.push(noteEls);
}

// 마지막 Final 제거 — 가사로 이미 표현됨
const finalDiv = document.createElement('div');
finalDiv.style.height = '10vh';
scoreEl.appendChild(finalDiv);

/* ---------- 자동 스크롤 + 재생 ---------- */
const caption = document.getElementById('caption');
const progress = document.getElementById('progress');
const hint = document.getElementById('hint');

// 스크롤 진행바만 업데이트
function updateProgress() {
  const sh = document.documentElement.scrollHeight - window.innerHeight;
  const sy = window.scrollY;
  const p = sh > 0 ? Math.min(1, Math.max(0, sy / sh)) : 0;
  progress.style.width = (p * 100) + '%';

  // 상단 타이틀 컴팩트 모드 토글
  const scoreTitle = document.getElementById('scoreTitle');
  const spacer = document.getElementById('titleSpacer');
  if (scoreTitle) {
    if (sy > 120) scoreTitle.classList.add('compact');
    else scoreTitle.classList.remove('compact');
    // 스페이서 높이 = 헤더 높이 + 여유 간격
    if (spacer) spacer.style.height = (scoreTitle.offsetHeight + 60) + 'px';
  }

  const vh = window.innerHeight;
  const fr = finalDiv.getBoundingClientRect();
  if (fr.top < vh * 0.7) finalDiv.classList.add('on');
}
window.addEventListener('scroll', updateProgress, { passive: true });

// 부드러운 스크롤 애니메이션
function smoothScrollTo(targetY, duration) {
  return new Promise(resolve => {
    const startY = window.scrollY;
    const diff = targetY - startY;
    const t0 = performance.now();
    function tick(now) {
      const t = Math.min(1, (now - t0) / duration);
      // easeInOutCubic
      const eased = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
      window.scrollTo(0, startY + diff * eased);
      if (t < 1) requestAnimationFrame(tick);
      else resolve();
    }
    requestAnimationFrame(tick);
  });
}

// 음표 튕김 (연결된 가사도 함께)
function bounceNote(el) {
  if (!el) return;
  if (el._bounce) el._bounce();
  if (el._lyric) {
    // 가사는 음표보다 조금 더 작게, 약간 늦게 튕김 (자연스러운 딜레이)
    setTimeout(() => animateBounce(el._lyric, -6, 320), 40);
  }
}

// 스테이브 재생 (노트별 튕김 + 사운드)
function playStaveSync(i) {
  return new Promise(resolve => {
    const melody = MELODIES[i];
    const notes = staveNotes[i];
    const bpm = BPMS[i];
    const beatDur = 60 / bpm;
    const types = ['triangle','triangle','sine','sine','triangle','triangle'];
    let t = 0;
    let lastEnd = 0;

    melody.forEach((note, idx) => {
      const startMs = t * 1000;
      const soundDur = note.d * beatDur * 0.9;
      const isLastMovement = (i === CAPTIONS.length - 1);
      const isFinalChord = note.chord && note.chord.length >= 5; // 풀 보이싱
      const hasChord = !!note.chord;

      setTimeout(() => {
        if (isLastMovement && hasChord) {
          // 오케스트라 화음 — 스트링+브라스 레이어
          const longDur = isFinalChord ? soundDur * 2.8 : soundDur * 1.4;
          playOrchestral(note.p, longDur, { gain: 0.11, sub: true });
          note.chord.forEach((cp, ci) => {
            playOrchestral(cp, longDur, { gain: Math.max(0.04, 0.09 - ci * 0.008) });
          });
          // 팀파니 타격
          playTimpani(note.p * 0.5, isFinalChord ? 2.4 : 0.9, isFinalChord ? 0.32 : 0.22);
          // 최종 코드엔 심벌까지
          if (isFinalChord) playCymbal(2.6, 0.14);
        } else if (isLastMovement) {
          // 피날레 단음도 레이어로 울림 있게
          playOrchestral(note.p, soundDur * 1.2, { gain: 0.07 });
        } else {
          // 일반 악장 — 기존 방식
          playTone(note.p, soundDur, types[i], 0.06);
          if (hasChord) {
            const chordGain = Math.max(0.025, 0.05 - note.chord.length * 0.003);
            note.chord.forEach(cp => playTone(cp, soundDur, types[i], chordGain));
          }
        }
        bounceNote(notes[idx]);
      }, startMs);
      t += note.d * beatDur;
      lastEnd = t;
    });

    // 마지막 음이 최종 코드면 오케스트라 잔향을 좀 더 기다림
    const lastNote = melody[melody.length - 1];
    const isFinale = i === CAPTIONS.length - 1 && lastNote.chord && lastNote.chord.length >= 5;
    const tail = isFinale ? 1800 : 0;
    setTimeout(resolve, lastEnd * 1000 + tail);
  });
}

// 자동 진행
let autoRunning = false;
async function startAutoPlay() {
  if (autoRunning) return;
  autoRunning = true;
  ensureAudio();

  // 인트로 힌트 숨기기
  hint.classList.add('hide');

  // 첫 줄 등장
  staveEls[0].classList.add('revealed');
  await wait(500);

  for (let i = 0; i < CAPTIONS.length; i++) {
    const el = staveEls[i];
    const rect = el.getBoundingClientRect();
    const targetY = window.scrollY + rect.top - window.innerHeight * 0.35;

    // 스크롤과 재생 병렬
    smoothScrollTo(targetY, 700);

    caption.textContent = CAPTIONS[i];
    caption.classList.add('on');

    // 다음 줄은 현재 멜로디 재생 중 살짝 일찍 등장시켜서 자연스럽게
    if (i + 1 < CAPTIONS.length) {
      setTimeout(() => {
        staveEls[i + 1].classList.add('revealed');
      }, 400);
    }

    // 마지막 악장이면 멜로디 후반부쯤에 피날레 타이포 한 글자씩 등장 예약
    if (i === CAPTIONS.length - 1) {
      scheduleFinaleReveal(i);
    }

    await playStaveSync(i);
  }

  // 마지막 악장 재생 후 추가 스크롤 없이 그대로 종료
  autoRunning = false;
}

// 마지막 악장 후반부에 추가 스크롤 불필요 — 악보 위치 그대로 유지
function scheduleFinaleReveal(i) {
  // 의도적으로 비움 (마지막 악보에서 멈춤)
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

// 사용자가 아무 곳이나 클릭/스크롤하면 자동 재생 시작 (오디오 정책 대응)
function kickOff() {
  ensureAudio();
  startAutoPlay();
  window.removeEventListener('click', kickOff);
  window.removeEventListener('keydown', kickOff);
  window.removeEventListener('wheel', kickOffWheel);
  window.removeEventListener('touchstart', kickOff);
}
function kickOffWheel(e) {
  // 처음 휠 입력만 시작 트리거로 사용
  kickOff();
}
window.addEventListener('click', kickOff);
window.addEventListener('keydown', kickOff);
window.addEventListener('wheel', kickOffWheel, { passive: true });
window.addEventListener('touchstart', kickOff);

// 초기 상태: 첫 스테이브만 노출, 진행바 업데이트
requestAnimationFrame(() => {
  staveEls[0].classList.add('revealed');
  staveEls[0].classList.add('active');
  updateProgress();
});
</script>
