<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motion Typography — Daily Media Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    color: #1d1d1f;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* 네비 */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 36px 40px 24px;
    border-bottom: 1px solid #e0e0e0;
  }
  nav .logo {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #000;
    line-height: 1;
  }
  nav .sub {
    font-size: 13px;
    color: #999;
    letter-spacing: 0.04em;
    padding-bottom: 6px;
  }

  /* 선반 영역 */
  .shelf {
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 40px 120px;
  }

  .shelf-label {
    font-size: 12px;
    font-weight: 500;
    color: #86868b;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 32px;
    padding-bottom: 12px;
    border-bottom: 1px solid #e0e0e0;
  }

  /* 책 그리드 */
  .books {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 32px 24px;
  }

  /* 개별 책 */
  .book {
    display: block;
    text-decoration: none;
    color: inherit;
    position: relative;
  }

  .book-cover {
    position: relative;
    aspect-ratio: 3/4;
    border-radius: 0;
    overflow: hidden;
    background: #f0f0f0;
    border: 1px solid #e0e0e0;
    box-shadow: none;
    transition: transform 0.4s cubic-bezier(0.25,0.1,0.25,1), box-shadow 0.4s;
    cursor: pointer;
  }

  /* 책 옆면 제거 */

  .book-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .book-cover .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: 700;
    color: #ccc;
    letter-spacing: -0.02em;
  }

  .book:hover .book-cover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }

  /* 책 정보 */
  .book-info {
    padding-top: 14px;
  }
  .book-date {
    font-size: 11px;
    color: #86868b;
    letter-spacing: 0.03em;
    margin-bottom: 4px;
  }
  .book-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    color: #1d1d1f;
    margin-bottom: 4px;
  }
  .book-concept {
    font-size: 12px;
    color: #86868b;
  }

  /* 푸터 */
  footer {
    text-align: center;
    padding: 40px;
    color: #aaa;
    font-size: 11px;
    border-top: 1px solid #e0e0e0;
  }

  @media (max-width: 734px) {
    nav { padding: 16px 20px; }
    .shelf { padding: 40px 20px 80px; }
    .books { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 24px 16px; }
    .book-title { font-size: 13px; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">Motion Typography</div>
  <div class="sub">Daily Media Art</div>
</nav>

<section class="shelf">
  <div class="shelf-label">All Works</div>

  <div class="books">

    <a class="book" href="day-002/index.html">
      <div class="book-cover">
        <div class="placeholder" style="background:#2a2a2a;color:#ff2d55;font-size:24px;font-style:italic;">SPRAY</div>
      </div>
      <div class="book-info">
        <div class="book-date">Day 002 · 2026.04.16</div>
        <div class="book-title">'텍스트 힙'의 시대, 요즘은 이렇게 읽는다</div>
        <div class="book-concept">그래피티 스프레이 · 인터랙티브</div>
      </div>
    </a>

    <a class="book" href="day-001/index.html">
      <div class="book-cover">
        <img src="day-001/text.png" alt="Day 001">
      </div>
      <div class="book-info">
        <div class="book-date">Day 001 · 2026.04.15</div>
        <div class="book-title">내 맘이란 추는 나를 더 깊게, 더 깊게 붙잡아</div>
        <div class="book-concept">중력 침강 · 압착 왜곡</div>
      </div>
    </a>

  </div>
</section>

<footer>Motion Typography — Daily Media Art</footer>

</body>
</html>
